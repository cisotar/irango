<!-- Mundo: Produto iRango — tokens FIXOS, SEM tema de loja -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRango · Criar conta</title>
<style>
  :root {
    --irango-brand:   #332616;
    --irango-fundo:   #f5f0e6;
    --irango-cta:     #2d3a27;
    --marrom-cafe:    #2e2610;
    --texto:          #3e2723;
    --texto-muted:    #6b5d4f;
    --borda-nav:      #dccbb0;
    --branco:         #ffffff;
    --cinza-claro:    #f9f9f9;
    --cinza-medio:    #eeeeee;
    --erro:           #991b1b;
    --sombra-suave:   rgba(0,0,0,0.10);
    --sombra-media:   rgba(0,0,0,0.15);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: var(--irango-fundo);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px 16px;
    color: var(--texto);
  }

  .brand { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 28px; }
  .brand-mark {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--irango-brand); display: flex; align-items: center; justify-content: center;
    font-size: 1.7rem; color: var(--branco); font-weight: 900;
    box-shadow: 0 4px 12px var(--sombra-media);
  }
  .brand-nome { font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--irango-brand); }

  .card {
    width: 100%; max-width: 400px;
    background: var(--branco); border: 1px solid var(--borda-nav);
    border-radius: 12px; box-shadow: 0 4px 12px var(--sombra-suave);
    padding: 32px 28px;
  }
  .card-titulo { font-size: 1.1rem; font-weight: 900; color: var(--marrom-cafe); margin: 0 0 4px; text-align: center; }
  .card-sub { font-size: 0.82rem; color: var(--texto-muted); text-align: center; margin: 0 0 24px; }

  .campo { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .campo label { font-size: 0.82rem; font-weight: 700; color: var(--texto); }
  .campo input {
    height: 44px; padding: 0 14px; border: 1px solid var(--borda-nav); border-radius: 10px;
    font-size: 0.95rem; color: var(--texto); background: var(--cinza-claro);
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .campo input:focus-visible {
    border-color: var(--irango-brand); box-shadow: 0 0 0 3px rgba(51,38,22,0.15);
  }
  .campo input[aria-invalid="true"] { border-color: var(--erro); }
  .campo .erro-msg { font-size: 0.78rem; color: var(--erro); }
  .campo .hint { font-size: 0.75rem; color: var(--texto-muted); }

  /* Checkbox aceite */
  .aceite { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
  .aceite input[type="checkbox"] {
    width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;
    accent-color: var(--irango-brand); cursor: pointer;
  }
  .aceite input[type="checkbox"]:focus-visible { outline: 3px solid var(--irango-brand); outline-offset: 2px; }
  .aceite label { font-size: 0.82rem; color: var(--texto-muted); line-height: 1.4; cursor: pointer; }
  .aceite label a { color: var(--irango-brand); font-weight: 700; text-decoration: none; }
  .aceite label a:hover { text-decoration: underline; }
  .aceite label a:focus-visible { outline: 2px solid var(--irango-brand); outline-offset: 2px; border-radius: 3px; }

  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; height: 48px; border: none; border-radius: 10px; cursor: pointer;
    background: var(--irango-cta); color: var(--branco);
    font-size: 0.95rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:focus-visible { outline: 3px solid var(--irango-cta); outline-offset: 3px; }
  .btn-primary:disabled { background: #9a9a9a; cursor: not-allowed; }

  .divisor { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divisor::before, .divisor::after { content: ""; flex: 1; height: 1px; background: var(--cinza-medio); }
  .divisor span { font-size: 0.78rem; color: var(--texto-muted); white-space: nowrap; }

  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; height: 48px; border: 1px solid var(--cinza-medio); border-radius: 10px; cursor: pointer;
    background: var(--branco); color: var(--texto);
    font-size: 0.9rem; font-weight: 600;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-google:hover { background: var(--cinza-claro); border-color: var(--borda-nav); }
  .btn-google:focus-visible { outline: 3px solid var(--irango-brand); outline-offset: 3px; }

  .card-footer { text-align: center; margin-top: 24px; font-size: 0.82rem; color: var(--texto-muted); }
  .card-footer a { color: var(--irango-brand); font-weight: 700; text-decoration: none; }
  .card-footer a:hover { text-decoration: underline; }
  .card-footer a:focus-visible { outline: 2px solid var(--irango-brand); outline-offset: 2px; border-radius: 3px; }
</style>
</head>
<body>
  <div class="brand" role="banner">
    <div class="brand-mark" aria-hidden="true">iR</div>
    <div class="brand-nome">iRango</div>
  </div>

  <main>
    <div class="card">
      <h1 class="card-titulo">Crie sua conta grátis</h1>
      <p class="card-sub">Sem cartão de crédito, sem burocracia.</p>

      <form novalidate>
        <div class="campo">
          <label for="email">E-mail</label>
          <input
            type="email" id="email" name="email"
            placeholder="voce@email.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <input
            type="password" id="senha" name="senha"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            minlength="8"
            required
            aria-describedby="senha-hint"
          >
          <span class="hint" id="senha-hint">Mínimo 8 caracteres.</span>
        </div>

        <div class="campo">
          <label for="confirmar-senha">Confirmar senha</label>
          <input
            type="password" id="confirmar-senha" name="confirmar-senha"
            placeholder="Repita a senha"
            autocomplete="new-password"
            required
          >
        </div>

        <div class="aceite">
          <input type="checkbox" id="aceite-termos" name="aceite-termos" required>
          <label for="aceite-termos">
            Li e concordo com os
            <a href="#">Termos de Uso</a>
            e a
            <a href="#">Política de Privacidade</a>
            do iRango.
          </label>
        </div>

        <button type="submit" class="btn-primary">
          Criar conta grátis
        </button>

        <div class="divisor"><span>ou</span></div>

        <button type="button" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true" focusable="false">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
            <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.176 0 7.548 0 9s.347 2.824.957 4.039l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Criar conta com Google
        </button>
      </form>
    </div>

    <p class="card-footer">
      Já tem conta? <a href="login.html">Entrar</a>
    </p>
  </main>
</body>
</html>
