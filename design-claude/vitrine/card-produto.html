<!-- @dsCard group="Vitrine" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine · Card de Produto</title>
<style>
  :root {
    --cor-fundo: #f5f0e6;
    --cor-destaque: #2d3a27;
    --preto: #111111;
    --branco: #ffffff;
    --cinza-medio: #eeeeee;
    --sombra-suave: rgba(0,0,0,0.1);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--cor-fundo); padding: 24px 16px; }
  .demo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 430px; margin: 0 auto; }
  .card {
    background: var(--branco); border: 1px solid var(--cinza-medio); border-radius: 12px;
    box-shadow: 0 4px 12px var(--sombra-suave); overflow: hidden; display: flex; flex-direction: column;
    position: relative;
  }
  .card .img {
    height: 140px; width: 100%; object-fit: cover;
    background: linear-gradient(135deg,#e8dcc4,#d8c4a0) center/cover;
    display: flex; align-items: center; justify-content: center; font-size: 2.4rem;
  }
  .card .body { padding: 12px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .card .nome {
    font-size: 0.92rem; font-weight: 700; color: var(--preto); margin: 0; line-height: 1.25;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card .footer { margin-top: auto; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card .preco { font-size: 1.15rem; font-weight: 900; color: var(--cor-destaque); }
  .btn-add {
    background: var(--cor-destaque); color: var(--branco); border: none; border-radius: 10px;
    min-width: 44px; min-height: 44px; font-size: 1.4rem; font-weight: 900; cursor: pointer; line-height: 1;
  }
  .btn-add:focus-visible { outline: 3px solid #fff; outline-offset: -3px; }
  /* Esgotado */
  .card.esgotado .body { opacity: 0.6; }
  .card.esgotado .img { position: relative; }
  .card.esgotado .img::after {
    content: ""; position: absolute; inset: 0;
    background: rgba(0,0,0,0.4); backdrop-filter: grayscale(1); -webkit-backdrop-filter: grayscale(1);
  }
  .ribbon {
    position: absolute; top: 56px; left: -10px; right: -10px; z-index: 2;
    background: #8B4513; color: #fff; border: 2px solid #fff; transform: rotate(-25deg);
    text-align: center; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
    font-size: 0.8rem; padding: 5px 0;
  }
  .btn-add[disabled] { background: #9a9a9a; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="demo">
    <article class="card">
      <div class="img" aria-hidden="true">🧀</div>
      <div class="body">
        <h3 class="nome">Pão de queijo artesanal — 6 unidades</h3>
        <div class="footer">
          <span class="preco">R$ 18,90</span>
          <button class="btn-add" aria-label="Adicionar Pão de queijo ao carrinho">+</button>
        </div>
      </div>
    </article>

    <article class="card esgotado">
      <div class="img" aria-hidden="true">🥐
        <span class="ribbon">Esgotado</span>
      </div>
      <div class="body">
        <h3 class="nome">Croissant de manteiga francês</h3>
        <div class="footer">
          <span class="preco">R$ 12,50</span>
          <button class="btn-add" disabled aria-label="Croissant esgotado, indisponível">+</button>
        </div>
      </div>
    </article>
  </div>
</body>
</html>
